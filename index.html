<button onclick="createShareLink()" class="link-btn" style="background:#3498db">创造分享链接</button>

<div id="linkDisplay" style="display:none; margin-top:10px; word-break:break-all; background:#1a1a2e; padding:10px; border:1px dashed #555;">
    <p style="font-size:12px; color:#aaa;">生成的临时 TXT 访问地址：</p>
    <code id="finalLink" style="color:#52eeff;"></code>
</div>

<script>
function createShareLink() {
    const code = document.getElementById('code').value;
    if(!code) { alert("没内容怎么变链接呀~"); return; }
    
    // 这里我们模拟生成一个指向当前页面的参数链接
    // 实际原理：把代码压缩后放进 URL 参数里
    const compressed = btoa(unescape(encodeURIComponent(code))).substring(0, 50); // 截取示例
    const currentUrl = window.location.href.split('?')[0];
    const shareUrl = currentUrl + "?data=" + compressed;

    document.getElementById('linkDisplay').style.display = 'block';
    document.getElementById('finalLink').textContent = shareUrl;
    
    document.getElementById('msg').textContent = "链接创造成功！(已模拟生成)";
}
</script>

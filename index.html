<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>zhifeijiyut.lua 生成器</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, sans-serif;
      background: #0f0f17;
      color: #e0e0ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    h1 {
      color: #a0c0ff;
      margin-bottom: 20px;
    }
    textarea {
      width: 90%;
      max-width: 960px;
      height: 480px;
      padding: 20px;
      background: #141422;
      border: 1px solid #333355;
      border-radius: 10px;
      color: #d0d0ff;
      font-family: Consolas, monospace;
      font-size: 15px;
      resize: vertical;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    button {
      margin-top: 20px;
      padding: 16px 60px;
      font-size: 18px;
      font-weight: bold;
      background: #4a6bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.25s;
    }
    button:hover {
      background: #5a7bff;
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(74,107,255,0.4);
    }
    #msg {
      margin-top: 20px;
      font-size: 16px;
      color: #a0ffcc;
    }
  </style>
</head>
<body>

  <h1>zhifeijiyut.lua 生成器</h1>

  <textarea id="code" placeholder="-- 粘贴你的 Lua 代码在这里
-- 点击按钮后会自动下载 zhifeijiyut.lua

print('zhifeijiyut 启动！')
local player = game.Players.LocalPlayer
player.Character.Humanoid.WalkSpeed = 100"></textarea>

  <button onclick="generate()">生成并下载 zhifeijiyut.lua</button>

  <div id="msg"></div>

  <script>
    function generate() {
      const code = document.getElementById('code').value.trim();
      const msg = document.getElementById('msg');

      if (!code) {
        msg.textContent = '请输入代码再生成哦～';
        msg.style.color = '#ff7777';
        return;
      }

      const blob = new Blob([code], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = 'zhifeijiyut.lua';
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      msg.textContent = '已下载 zhifeijiyut.lua • 大小：' + (code.length / 1024).toFixed(1) + ' KB';
      msg.style.color = '#a0ffcc';
    }
  </script>

</body>
</html>
